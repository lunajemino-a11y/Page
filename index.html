<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GelJemi - Premium Discounted Store</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="container">

  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="logo">Gelshop</div>
    <div class="nav-links" role="menubar">
      <a href="#" class="nav-link active" data-action="home">Home</a>
      <a href="#items" class="nav-link" data-action="items">Items</a>
      <a href="#promos" class="nav-link" data-action="promos">Promos</a>
    </div>
  </nav>

  <main id="app" role="main">
    <div id="home-view">
      <header class="hero-section">
        <div class="hero-content">
          <div class="hero-text">
            <span class="badge">🔥 DISCOUNTED PRICES</span>
            <h1>GelJemi<br><span class="gradient-text">Discounted Store</span></h1>
            <p class="lead">Your premium gateway to discounted gaming top-ups, internet packages, streaming subscriptions, and premium tools.</p>

            <div class="hero-buttons">
              <button class="btn btn-primary" data-scroll-to="promos">Check Promos</button>
              <button class="btn btn-secondary" data-scroll-to="items">Explore Items</button>
            </div>
          </div>

          <div class="hero-visual" aria-hidden="true">
            <div class="glass-pillar pillar-1"></div>
            <div class="glass-pillar pillar-2"></div>
            <div class="glass-pillar pillar-3"></div>
          </div>
        </div>
      </header>

      <section class="portfolio-section" id="items">
        <div class="section-header">
          <h2>These are the items<br><span class="gradient-text">we offer</span></h2>
        </div>
        <div id="itemsGrid" class="cards-grid" aria-live="polite"></div>
      </section>

      <section class="portfolio-section" id="promos">
        <div class="section-header">
          <h2>Hot <span class="gradient-text">Promos</span></h2>
        </div>

        <div class="promo-filters" role="toolbar" aria-label="Promo filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="STREAMING">Streaming</button>
          <button class="filter-btn" data-filter="GAMING">Gaming</button>
          <button class="filter-btn" data-filter="INTERNET">Internet</button>
          <button class="filter-btn" data-filter="BOOSTING">Boosting</button>
        </div>

        <div class="promo-swipe-wrapper">
          <div id="promosGrid" class="promos-grid" aria-live="polite"></div>
        </div>
      </section>

      <section class="portfolio-section" id="extra-layer">
        <div class="section-header">
          <h2>Additional <span class="gradient-text">Packages</span></h2>
        </div>
        <div class="promo-swipe-wrapper">
          <div id="extraGrid" class="promos-grid" aria-live="polite"></div>
        </div>
      </section>
    </div>

    <div id="category-view" style="display:none;">
      <section class="portfolio-section">
        <button id="dynamic-back-btn" class="glass-back-btn" aria-label="Back to previous">← <span id="back-btn-text">Back to Home</span></button>

        <div class="section-header" style="margin-top:10px;">
          <h2 id="selection-page-title">Choose your <span class="gradient-text" id="category-title">Platform</span></h2>
        </div>

        <div id="variant-filters" class="promo-filters" style="display:none; margin-bottom:20px;">
          <button class="filter-btn active" data-variant="all">All</button>
          <button class="filter-btn" data-type="load" data-variant="REGULAR_LOAD">Regular Load</button>
          <button class="filter-btn" data-type="load" data-variant="PROMO_LOAD">Promo Load</button>
          <button class="filter-btn" data-type="game" data-variant="GAME_PASS">Game Pass</button>
          <button class="filter-btn" data-type="game" data-variant="GAME_TOKEN">Game Token</button>
        </div>

        <div id="category-items-grid" class="cards-grid" aria-live="polite"></div>
      </section>
    </div>
  </main>
</div>

<!-- Order Modal -->
<div id="orderModal" class="order-modal" aria-hidden="true" role="dialog" aria-labelledby="orderTitle">
  <div class="order-modal-content">
    <h2 id="orderTitle">Order Details</h2>
    <div class="order-preview" id="orderPreview">
      <div id="orderInfo"></div>
      <div id="dynamicFields"></div>
    </div>

    <div class="modal-actions">
      <button id="messengerBtn" class="messenger-btn" disabled>Copy & Open Messenger</button>
      <button id="closeModalBtn" class="close-btn">Close</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast" aria-live="polite" role="status"></div>

<!-- Scripts -->
<script src="data.js"></script>
<script src="index.js"></script>
</body>
</html>
